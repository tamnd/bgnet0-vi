name: Release

# PAUSED during the translation marathon: only manual runs. Once all 43
# chapters are translated and CI is re-enabled, restore the tag trigger:
#
#   push:
#     tags:
#       - 'v*-vi.*'
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already be pushed, e.g. v1.0.40-vi.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: $TAG"

      - name: Checkout at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          submodules: recursive

      - name: Read upstream provenance
        id: upstream
        run: |
          UPSTREAM_COMMIT="$(grep -oE '\*\*Commit:\*\* `[a-f0-9]+`' UPSTREAM.md | head -1 | sed -E 's/.*`([a-f0-9]+)`.*/\1/')"
          UPSTREAM_VERSION="$(grep -oE '\*\*Version:\*\* [^(]+' UPSTREAM.md | head -1 | sed -E 's/\*\*Version:\*\* //' | xargs)"
          echo "commit=$UPSTREAM_COMMIT" >> "$GITHUB_OUTPUT"
          echo "version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream: $UPSTREAM_VERSION @ $UPSTREAM_COMMIT"

      - name: Build guide
        env:
          BUILD_IMAGE: ghcr.io/tamnd/beej-vi-docker:latest
        run: |
          docker pull "$BUILD_IMAGE"
          docker run --rm \
            -v "$PWD:/guide" \
            -w /guide \
            -e BGBS_THREADS=4 \
            "$BUILD_IMAGE" \
            bash scripts/build_vi.sh

      - name: Package release artifacts
        id: package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          STAGE="release/$TAG"
          rm -rf release && mkdir -p "$STAGE"

          cp docs/pdf/*.pdf "$STAGE/"
          cp docs/epub/bgnet0.epub "$STAGE/"
          cp docs/html/bgnet0.zip      "$STAGE/bgnet0_html.zip"
          cp docs/html/bgnet0-wide.zip "$STAGE/bgnet0_html_wide.zip"
          cp docs/source/bgnet0_source.zip "$STAGE/"
          tar -czf "$STAGE/bgnet0_site.tar.gz" -C docs .

          ls -la "$STAGE"
          echo "dir=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          UPSTREAM_VERSION="${{ steps.upstream.outputs.version }}"
          UPSTREAM_COMMIT="${{ steps.upstream.outputs.commit }}"
          UPSTREAM_COMMIT_SHORT="$(echo "$UPSTREAM_COMMIT" | cut -c1-10)"

          {
            echo "# $TAG"
            echo
            echo "Vietnamese translation of **Beej's Guide to Network Concepts**,"
            echo "based on upstream $UPSTREAM_VERSION"
            echo "(commit [\`$UPSTREAM_COMMIT_SHORT\`](https://github.com/beejjorgensen/bgnet0/commit/$UPSTREAM_COMMIT))."
            echo
            echo "## Artifacts"
            echo
            echo "- HTML: \`bgnet0_html.zip\` (standard width), \`bgnet0_html_wide.zip\` (wide)"
            echo "- EPUB: \`bgnet0.epub\`"
            echo "- PDF (US Letter): \`bgnet0_usl_c_1.pdf\`, \`bgnet0_usl_c_2.pdf\`, \`bgnet0_usl_bw_1.pdf\`, \`bgnet0_usl_bw_2.pdf\`"
            echo "- PDF (A4): \`bgnet0_a4_c_1.pdf\`, \`bgnet0_a4_c_2.pdf\`, \`bgnet0_a4_bw_1.pdf\`, \`bgnet0_a4_bw_2.pdf\`"
            echo "  (\`_c_\` = color, \`_bw_\` = black & white; \`_1\` = single-sided, \`_2\` = double-sided)"
            echo "- Source examples: \`bgnet0_source.zip\`"
            echo "- Full site mirror: \`bgnet0_site.tar.gz\`"
            echo
            echo "## Reading online"
            echo
            echo "Latest build is published at <https://tamnd.github.io/bgnet0-vi/>."
            echo
            echo "## Upstream reference"
            echo
            echo "- Repo: <https://github.com/beejjorgensen/bgnet0>"
            echo "- Original English: <https://beej.us/guide/bgnet0/>"
          } > release_notes.md

          cat release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release_notes.md
          files: ${{ steps.package.outputs.dir }}/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
